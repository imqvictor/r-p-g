<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Role Playing Game</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="card">
            <nav>
                <p>XP:<b id="xp">0</b></p>
                <P>Health:<b id="health">0</b></P>
                <p>Gold:<b id="gold">0</b></p>
            </nav>
            <section>
                <button id="btn1">Go to store</button>
                <button id="btn2">Go to cave</button>
                <button id="btn3">Fight dragon</button>
            </section>
            <div id="monSterStarts">
                <span class="stat">Monster Name:<strong id="monsterName"></strong></span>
                <span class="stat">Health:<strong><span id="monsterHealth"></span></strong></span>
            </div>
            <article>
                <p id="txt">Welcome to the Dragon Reppeller. You must
                    <br> defeat the dragon that is preventing
                    <br>people from leaving the town. You are in
                    <br> the town square. Where do you want to
                    <br>go? Use the buttons above.
                </p>
            </article>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
